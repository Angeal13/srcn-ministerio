{% extends "base.html" %}
{% block title %}Nuevo Usuario{% endblock %}
{% block content %}
<div class="page-header"><div class="page-header-left"><div class="page-title">Crear Nuevo Usuario</div></div></div>
<form method="POST">
  <div class="card" style="max-width:500px">
    <div class="card-header"><div class="card-title">👮 Datos del Agente</div></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">Nombre completo <span class="required">*</span></label><input type="text" name="nombre_completo" class="form-control" required></div>
        <div class="form-group"><label class="form-label">Nombre de usuario <span class="required">*</span></label><input type="text" name="nombre_usuario" class="form-control" required autocomplete="off"></div>
        <div class="form-group"><label class="form-label">Número de placa</label><input type="text" name="numero_placa" class="form-control"></div>
        <div class="form-group"><label class="form-label">Contraseña <span class="required">*</span></label><input type="password" name="password" class="form-control" required minlength="8"></div>
        <div class="form-group"><label class="form-label">Rol <span class="required">*</span></label>
          <select name="rol" class="form-control">
            <option value="agente">Agente</option>
            <option value="inspector">Inspector</option>
            <option value="jefe">Jefe de Comisaría</option>
            <option value="readonly">Solo lectura</option>
            <option value="superadmin">Superadmin</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Comisaría</label>
          <select name="comisaria_id" class="form-control">
            <option value="">— Sin asignar —</option>
            {% for c in comisarias %}<option value="{{ c.id }}">{{ c.nombre }}</option>{% endfor %}
          </select>
        </div>
      </div>
    </div>
    <div class="card-footer flex gap-1">
      <button type="submit" class="btn btn-primary">Crear usuario</button>
      <a href="{{ url_for('admin.usuarios') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </div>
</form>
{% endblock %}
