{% extends "base.html" %}
{% block title %}Registrar Sujeto{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="page-breadcrumb"><a href="{{ url_for('sujetos.lista') }}">Sujetos</a> <span>›</span> Nuevo</div>
    <div class="page-title">Registrar Nuevo Sujeto</div>
  </div>
</div>
<form method="POST">
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:1.25rem;align-items:start">
    <div style="display:flex;flex-direction:column;gap:1.25rem">
      <div class="card">
        <div class="card-header"><div class="card-title">📄 Datos de Identificación</div></div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Nombres <span class="required">*</span></label>
              <input type="text" name="nombres" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label">Apellidos <span class="required">*</span></label>
              <input type="text" name="apellidos" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label">Número de Documento (DNI)</label>
              <div class="dni-lookup">
                <input type="text" name="dni" id="dni-lookup-input" class="form-control" placeholder="Ej. 123456789A" autocomplete="off">
                <div id="dni-lookup-result" class="dni-result"></div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Fecha de Nacimiento</label>
              <input type="date" name="fecha_nacimiento" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Sexo</label>
              <select name="sexo" class="form-control">
                <option value="">— Seleccionar —</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Nacionalidad</label>
              <input type="text" name="nacionalidad" class="form-control" value="Ecuatoguineana">
            </div>
            <div class="form-group full">
              <label class="form-label">Dirección conocida</label>
              <input type="text" name="direccion" class="form-control" placeholder="Barrio, calle, número…">
            </div>
            <div class="form-group">
              <label class="form-label">Teléfono</label>
              <input type="tel" name="telefono" class="form-control">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:1.25rem">
      <div class="card">
        <div class="card-header"><div class="card-title">⚠ Clasificación</div></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">Nivel de Riesgo</label>
            <select name="nivel_riesgo" class="form-control">
              <option value="bajo">Bajo</option>
              <option value="medio">Medio</option>
              <option value="alto">Alto</option>
              <option value="critico">Crítico</option>
            </select>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-body" style="display:flex;flex-direction:column;gap:.75rem">
          <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Registrar Sujeto</button>
          <a href="{{ url_for('sujetos.lista') }}" class="btn btn-ghost w-full" style="justify-content:center">Cancelar</a>
        </div>
      </div>
    </div>
  </div>
</form>
{% endblock %}
