{% extends "base.html" %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="page-title">Cambiar Contraseña</div>
  </div>
</div>
<div class="card" style="max-width:420px">
  <div class="card-header"><div class="card-title">🔑 Nueva contraseña</div></div>
  <div class="card-body">
    <form method="POST" style="display:flex;flex-direction:column;gap:.85rem">
      <div class="form-group">
        <label class="form-label">Contraseña actual</label>
        <input type="password" name="password_actual" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" name="nueva_password" class="form-control" required minlength="8">
        <span class="form-hint">Mínimo 8 caracteres</span>
      </div>
      <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
    </form>
  </div>
</div>
{% endblock %}
